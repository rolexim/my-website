name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build site & validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python deps
        working-directory: site
        run: uv sync --frozen

      - name: Build Pelican site
        working-directory: site
        run: uv run pelican content -s pelicanconf.py -o output

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/

      - name: Terraform validate (bootstrap)
        working-directory: infra/bootstrap
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Terraform validate (site)
        working-directory: infra/site
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-output
          path: site/output
          retention-days: 7
