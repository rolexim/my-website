name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC token for AWS, plus read access to the repo.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  TF_IN_AUTOMATION: "1"

jobs:
  deploy:
    name: Apply infra & publish site
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.tf-output.outputs.site_url }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: 1.14.9
          terraform_wrapper: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      # ----- Infra ----------------------------------------------------------
      - name: Terraform init (site)
        working-directory: infra/site
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"

      - name: Terraform apply (site)
        working-directory: infra/site
        run: terraform apply -auto-approve -input=false

      - name: Read Terraform outputs
        id: tf-output
        working-directory: infra/site
        run: |
          {
            echo "site_bucket=$(terraform output -raw site_bucket)"
            echo "distribution_id=$(terraform output -raw distribution_id)"
            echo "site_url=$(terraform output -raw site_url)"
          } >> "$GITHUB_OUTPUT"

      # ----- Site -----------------------------------------------------------
      - name: Build site
        working-directory: site
        env:
          CF_ANALYTICS_TOKEN: ${{ secrets.CF_ANALYTICS_TOKEN }}
        run: |
          uv sync --frozen --group build
          uv run python ../scripts/generate_og_image.py
          uv run pelican content -s publishconf.py -o output

      - name: Sync to S3
        run: |
          aws s3 sync site/output/ "s3://${{ steps.tf-output.outputs.site_bucket }}/" \
            --delete \
            --cache-control "public, max-age=300, s-maxage=86400" \
            --exclude "*.html" --exclude "robots.txt" --exclude "sitemap.xml"

          # HTML/text content: shorter TTL so edits go live quickly.
          aws s3 sync site/output/ "s3://${{ steps.tf-output.outputs.site_bucket }}/" \
            --exclude "*" \
            --include "*.html" --include "robots.txt" --include "sitemap.xml" \
            --cache-control "public, max-age=60, s-maxage=300"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf-output.outputs.distribution_id }}" \
            --paths '/*'
